name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PR preview
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/pr_${{ github.event.pull_request.number }}/

      - name: Deploy to gh-pages (PR sub-directory)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          destination_dir: pr_${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/pr_${prNumber}/`;

            // Find and update existing bot comment if present, otherwise create new one
            const { data: comments } = await github.rest.issues.listComments({
              ...repo,
              issue_number: prNumber,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🔍 PR Preview')
            );

            const body = `🔍 **PR Preview deployed!**\n\n➡️ [View at \`/pr_${prNumber}/\`](${previewUrl})\n\n_Updated on push to this PR._`;

            if (botComment) {
              await github.rest.issues.updateComment({
                ...repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: prNumber,
                body,
              });
            }
